<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Girl'z Power</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/ebe3054567.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script type="module" src="../js/navbar-user.js"></script>

    <style>
        .cart-container {
            max-width: 900px;
            margin: 150px auto 50px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(112, 92, 73, 0.1);
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #EAE3D9;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-item-info {
            flex: 1;
            margin-left: 20px;
        }

        .cart-total {
            text-align: right;
            padding: 25px;
            font-size: 1.8rem;
            color: #705C49;
            font-family: 'Bitter', serif;
            font-weight: bold;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: #705C49;
            color: #F3EEE4;
            border: none;
            cursor: pointer;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .remove-btn {
            color: #a33b3b;
            cursor: pointer;
            border: 1px solid #eee;
            background: white;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .cart-qty-controls button {
            padding: 5px 10px;
            cursor: pointer;
            border: 1px solid #705C49;
            background: white;
            border-radius: 4px;
        }
    </style>
</head>

<body class="store-page">
    <header>
        <div class="Bar">


            <ul>

                <li id="nav-auth">

                    <a href="Login.html" id="signInLink">Sign In</a>
                </li>
                <li id="nav-register">
                    <a href="Register.html" id="signUpLink">Sign Up</a>
                </li>
            </ul>


            <nav>
                <div><a href="./Home.html">Home</a></div>
                <div class="jewelry"><a href="./store.html">Store</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Necklaces.html">Necklace</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Earrings.html">Earrings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Rings.html">Rings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Bracelets.html">Bracelets</a><i class="fa-solid fa-gem icon"></i></div>
            </nav>
            <div class="cart"> <a href="../html/Card.html">Cart</a> <i class="fa-solid fa-cart-arrow-down"
                    style="color: #f6f0eb;"></i></div>
        </div>
    </header>

    <main>
        <div class="cart-container">
            <h1 class="section-title">Your Shopping Bag</h1>
            <div id="cart-items-list"></div>
            <div class="cart-total" id="cart-total-price">Total: $0</div>
            <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
        </div>
    </main>

    <!-- /* استبدلي جزء الـ <script type="module"> في ملف Card.html بهذا */ -->
    <script type="module">
        import { db, auth } from "../js/CDNFirebase.js";
        import { collection, addDoc, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const list = document.getElementById('cart-items-list');
            let total = 0;

            if (cart.length === 0) {
                list.innerHTML = "<p style='text-align:center; padding:50px;'>Your bag is empty.</p>";
                document.getElementById('cart-total-price').innerText = "Total: $0";
                return;
            }

            list.innerHTML = "";
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                list.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}">
                <div class="cart-item-info">
                    <h4>${item.title}</h4>
                    <p>$${item.price} x ${item.quantity}</p>
                    <div class="cart-qty-controls">
                        <button onclick="window.updateQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="window.updateQty(${index}, 1)">+</button>
                    </div>
                </div>
                <button class="remove-btn" onclick="window.removeItem(${index})">Remove</button>
            </div>`;
            });
            document.getElementById('cart-total-price').innerText = "Total: $" + total.toFixed(2);
        }

        window.updateQty = (index, change) => {
            let cart = JSON.parse(localStorage.getItem('myCart'));
            let newQty = cart[index].quantity + change;
            if (newQty >= 1 && newQty <= (cart[index].maxStock || 100)) {
                cart[index].quantity = newQty;
                localStorage.setItem('myCart', JSON.stringify(cart));
                displayCart();
            } else if (newQty > cart[index].maxStock) {
                alert("No more stock available!");
            }
        };

        window.removeItem = (index) => {
            let cart = JSON.parse(localStorage.getItem('myCart'));
            cart.splice(index, 1);
            localStorage.setItem('myCart', JSON.stringify(cart));
            displayCart();
        };

        async function checkout() {
            if (!auth.currentUser) {
                alert("🔒 Please login first!");
                window.location.href = "./Login.html";
                return;
            }

            const cart = JSON.parse(localStorage.getItem('myCart')) || [];
            if (cart.length === 0) return;

            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerText = "Updating Stock...";

            try {
                // 1. تحديث المخزون في Firebase لكل منتج
                for (const item of cart) {
                    const productRef = doc(db, "products", item.id);
                    await updateDoc(productRef, {
                        stock_quantity: increment(-item.quantity)
                    });
                }

                // 2. إنشاء الطلب للأدمن
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                await addDoc(collection(db, "orders"), {
                    customerEmail: auth.currentUser.email,
                    items: cart,
                    totalAmount: total.toFixed(2),
                    status: "Pending",
                    timestamp: new Date()
                });

                alert("🎉 Order Successful!");
                localStorage.removeItem('myCart');
                window.location.href = "./Home.html";

            } catch (error) {
                alert("Error: " + error.message);
                btn.disabled = false;
            }
        }

        document.getElementById('checkout-btn').onclick = checkout;
        displayCart();
    </script>
</body>

</html>
