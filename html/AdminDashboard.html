<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Girl'z Jewellery</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/ebe3054567.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300;500;700&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #705C49;
            --accent: #D6C5A9;
            --bg: #F3EEE4;
            --glass: rgba(255, 255, 255, 0.6);
        }
        body { background-color: var(--bg); font-family: 'Bitter', serif; margin: 0; }
        .dashboard-wrapper { display: flex; min-height: 100vh; }
        .admin-sidebar {
            width: 260px; background: var(--primary); color: white;
            padding: 30px 20px; display: flex; flex-direction: column;
            position: fixed; height: 100%;
        }
        .admin-profile-section { text-align: center; margin-bottom: 40px; }
        .admin-avatar { font-size: 3rem; margin-bottom: 10px; color: var(--accent); }
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; }
        .side-btn {
            background: transparent; border: none; color: #ececec;
            padding: 15px; text-align: left; font-size: 1rem;
            cursor: pointer; border-radius: 10px; transition: 0.3s;
        }
        .side-btn.active, .side-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent); }
        .admin-main { flex: 1; margin-left: 260px; padding: 40px; }
        .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .add-new-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .admin-table {
            width: 100%; border-collapse: collapse; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 15px; overflow: hidden;
        }
        .admin-table th, .admin-table td { padding: 18px; text-align: left; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .admin-table th { background: var(--primary); color: white; }
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; width: 450px; border-radius: 20px; position: relative; }
        .modal-content input, .modal-content textarea { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .cat-badge { background: var(--accent); color: var(--primary); padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="dashboard-wrapper">
    <aside class="admin-sidebar">
        <div class="admin-profile-section">
            <div class="admin-avatar"><i class="fa-solid fa-circle-user"></i></div>
            <h3 id="adminName">Admin Panel</h3>
            <p>Jewellery Store Manager</p>
        </div>
        <nav class="sidebar-nav">
            <button class="side-btn active" onclick="showSection('products', this)"><i class="fa-solid fa-gem"></i> Products</button>
            <button class="side-btn" onclick="showSection('categories', this)"><i class="fa-solid fa-list-ul"></i> Categories</button>
            <button class="side-btn" onclick="showSection('orders', this)"><i class="fa-solid fa-truck-fast"></i> Orders</button>
        </nav>
    </aside>

    <main class="admin-main">
        <header class="main-header">
            <h2 id="section-title">Manage Products</h2>
            <button class="add-new-btn" id="mainActionBtn">+ Add New Product</button>
        </header>
        <div id="content-area"></div>
    </main>
</div>

<div id="productModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModals()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h3 id="modalTitle">Product Details</h3>
        <form id="productForm">
            <input type="hidden" id="pId"> <input type="text" id="pTitle" placeholder="Product Name" required>
            <input type="text" id="pCategory" placeholder="Category (necklace, ring...)" required>
            <input type="number" id="pPrice" placeholder="Price ($)" required>
            <input type="number" id="pStock" placeholder="Stock Quantity" required>
            <input type="text" id="pImage1" placeholder="Main Image URL" required>
            <textarea id="pDesc" placeholder="Product Description"></textarea>
            <button type="submit" class="add-new-btn" style="width:100%">Save Product</button>
        </form>
    </div>
</div>

<div id="categoryModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModals()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
        <h3>Add New Category</h3>
        <form id="categoryForm">
            <input type="text" id="catName" placeholder="Category Name" required>
            <input type="text" id="catImg" placeholder="Category Image URL" required>
            <button type="submit" class="add-new-btn" style="width:100%">Add Category</button>
        </form>
    </div>
</div>

<script type="module" src="../js/admin-dashboard.js"></script>

<script>
    function closeModals() { 
        document.getElementById('productModal').style.display = 'none'; 
        document.getElementById('categoryModal').style.display = 'none';
    }
    window.onclick = (event) => { if (event.target.className === 'modal') closeModals(); }
</script>

</body>
</html>
