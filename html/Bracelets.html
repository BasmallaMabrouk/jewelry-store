    <script type="module">

/* ===============================
 */
import { db } from "../js/CDNFirebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* ===============================
    */
function quickAdd(id, title, price, image, stock) {
    let cart = JSON.parse(localStorage.getItem('myCart')) || [];
    const existingIndex = cart.findIndex(item => item.id === id);

    if (existingIndex > -1) {
        if (cart[existingIndex].quantity < stock) {
            cart[existingIndex].quantity += 1;
        } else {
            alert("Maximum stock reached for this ring!");
            return;
        }
    } else {
        cart.push({
            id,
            title,
            price,
            image,
            quantity: 1,
            maxStock: stock
        });
    }

    localStorage.setItem('myCart', JSON.stringify(cart));
    window.location.href = "./Card.html";
}

/* ===============================

================================ */

/* ===============================
  (Firebase)
================================ */
async function getRingsFromFirebase() {
    const snapshot = await getDocs(collection(db, "products"));
    const rings = [];

    snapshot.forEach(doc => {
        const data = doc.data();
        if (data.category === "bracelet") {
            rings.push({
                id: doc.id,
                ...data
            });
        }
    });

    return rings;
}

/* ===============================
    */
function renderRings(products) {
    const grid = document.getElementById("product-grid");
    grid.innerHTML = "";

    for (const product of products) {
        const mainImg = product.images?.[0] || '';
        const hoverImg = product.images?.[1] || mainImg;

        const card = `
            <div class="product-card">
                <div class="product-img-box">
                    <img src="${mainImg}" class="img-main">
                    <img src="${hoverImg}" class="img-hover">
                </div>

                <div class="product-info">
                    <h3>${product.title}</h3>

                    <div class="price-row">
                        <span class="price">$${product.price}</span>
                        <span class="rating">⭐ ${product.rating}</span>
                    </div>

                    <p class="stock-label">
                        Available: <span class="stock-number">${product.stock_quantity}</span>
                    </p>

                    <div class="product-buttons">
                        <button class="add-to-cart-btn"
                            onclick="quickAdd('${product.id}', '${product.title}', ${product.price}, '${mainImg}', ${product.stock_quantity})">
                            Add to Cart
                        </button>

                        <a href="./details.html?id=${product.id}">
                            <button class="details-btn">View Details</button>
                        </a>
                    </div>
                </div>
            </div>
        `;

        grid.innerHTML += card;
    }
}

/* ===============================
   (Firebase Rings)
================================ */
(async function () {
    const rings = await getRingsFromFirebase();
    renderRings(rings);
})();

</script>
