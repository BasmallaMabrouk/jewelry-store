<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bracelets - Luxury Jewelry</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/ebe3054567.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="../js/navbar-user.js"></script>
    <style>
        .stock-label {
            font-size: 0.9rem;
            color: #8D7B68;
            margin: 10px 0;
            font-family: 'Bitter', serif;
        }

        .stock-number {
            font-weight: bold;
            color: #705C49;
        }

        /* ستايل الـ Toast التنبيهي */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #705C49;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 3000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Bitter', serif;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>

<body class="store-page">
    <header>
        <div class="Bar">
            <li id="userBox">
                <a style="color: #f6f0eb;" href="../html/Login.html" id="loginBtn">Login</a>
            </li>
            <nav>
                <div><a href="./Home.html">Home</a></div>
                <div class="jewelry"><a href="./store.html">Store</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Necklaces.html">Necklace</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Earrings.html">Earrings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Rings.html">Rings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Bracelets.html">Bracelets</a><i class="fa-solid fa-gem icon"></i></div>
            </nav>
            <div class="cart"> 
                <a href="../html/Card.html">Cart</a> 
                <i class="fa-solid fa-cart-arrow-down" style="color: #f6f0eb;"></i>
            </div>
        </div>
    </header>

    <img src="../images/tttt.png" class="imagefadedd">

    <main>
        <section class="carts">
            <h1 class="section-title">Our Bracelets</h1>
            <div id="product-grid" class="product-grid"></div>
        </section>
    </main>

    <div id="toast">Item added to cart! ✨</div>

    <footer class="main-footer">
        <p>© Girl`z Power A | B | M | G .</p>
    </footer>

   <script type="module">
    import { db } from "../js/CDNFirebase.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerText = message;
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function quickAdd(id, title, price, image, stock) {
        let cart = JSON.parse(localStorage.getItem('myCart')) || [];
        const existingIndex = cart.findIndex(item => item.id === id);

        if (existingIndex > -1) {
            if (cart[existingIndex].quantity < stock) {
                cart[existingIndex].quantity += 1;
            } else {
                showToast("Maximum stock reached!");
                return;
            }
        } else {
            cart.push({ id, title, price, image, quantity: 1, maxStock: stock });
        }

        localStorage.setItem('myCart', JSON.stringify(cart));
        showToast(`${title} added to cart! ✨`);
    }
    window.quickAdd = quickAdd;

    async function getBraceletsFromFirebase() {
        try {
            const snapshot = await getDocs(collection(db, "products"));
            const items = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                if (data.category && (data.category.toLowerCase().includes("bracelet"))) {
                    items.push({ id: doc.id, ...data });
                }
            });
            return items;
        } catch (error) { return []; }
    }

    function renderBracelets(products) {
        const grid = document.getElementById("product-grid");
        if (!grid) return;
        grid.innerHTML = "";

        products.forEach(product => {
            const stock = product.stock_quantity || product.stock || 0;
            const isOutOfStock = stock <= 0;
            const mainImg = product.images?.[0] || product.image || '';
            const hoverImg = product.images?.[1] || mainImg;

            const cardHTML = `
            <div class="product-card" style="${isOutOfStock ? 'opacity: 0.6;' : ''}">
                <div class="product-img-box">
                    <img src="${mainImg}" class="img-main">
                    <img src="${hoverImg}" class="img-hover">
                    ${isOutOfStock ? '<div style="position:absolute; top:10px; left:10px; background:#e74c3c; color:white; padding:5px 10px; border-radius:5px; font-weight:bold; z-index:10;">Sold Out</div>' : ''}
                </div>
                <div class="product-info">
                    <h3>${product.title}</h3>
                    <div class="price-row">
                        <span class="price">$${product.price}</span>
                        <span class="rating">⭐ ${product.rating || '5.0'}</span>
                    </div>
                    <p class="stock-label">
                        ${isOutOfStock ? '<span style="color:#e74c3c; font-weight:bold;">Out of Stock</span>' : `Available: <span class="stock-number">${stock}</span>`}
                    </p>
                    <div class="product-buttons">
                        <button class="add-to-cart-btn" 
                            ${isOutOfStock ? 'disabled style="background:#ccc; cursor:not-allowed;"' : ''} 
                            onclick="quickAdd('${product.id}', '${product.title}', ${product.price}, '${mainImg}', ${stock})">
                            ${isOutOfStock ? 'Finished' : 'Add to Cart'}
                        </button>
                        <a href="./details.html?id=${product.id}">
                            <button class="details-btn">View Details</button>
                        </a>
                    </div>
                </div>
            </div>`;
            grid.innerHTML += cardHTML;
        });
    }

    (async function init() {
        const bracelets = await getBraceletsFromFirebase();
        renderBracelets(bracelets);
    })();
</script>
</body>

</html>
