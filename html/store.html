<body class="store-page">
    <header>

        <div class="Bar">
            <li id="userBox">
                <a style="color: #f6f0eb;" href="../html/Login.html" id="loginBtn">Login</a>
            </li>
            <nav>
                <div><a href="./Home.html">Home</a></div>
                <div class="jewelry"><a href="./store.html">Store</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Necklaces.html">Necklace</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Earrings.html">Earrings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Rings.html">Rings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Bracelets.html">Bracelets</a><i class="fa-solid fa-gem icon"></i></div>

            </nav>
            <div class="cart"> <a href="../html/Card.html">Cart</a> <i class="fa-solid fa-cart-arrow-down"
                    style="color: #f6f0eb;"></i></div>
        </div>
    </header>
    <img src="../images/tttt.png" class="imagefadedd">

    <main class="store-main">
        <h1 class="section-title">Our Collection</h1>
        <div id="product-grid" class="product-grid"></div>
    </main>

    <footer class="main-footer">
        <p>© Girl`z Power A | B | M | G .</p>
    </footer>

    <script type="module">

        /* ===============================
         */
        import { db } from "../js/CDNFirebase.js";
        import {
            collection,
            getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. Unified Cart Logic
        function quickAdd(id, title, price, image, stock) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const existingIndex = cart.findIndex(item => item.id === id);

            if (existingIndex > -1) {
                if (cart[existingIndex].quantity < stock) {
                    cart[existingIndex].quantity += 1;
                } else {
                    alert("Maximum stock reached!");
                    return;
                }
            } else {
                cart.push({
                    id: id,
                    title: title,
                    price: price,
                    image: image,
                    quantity: 1,
                    maxStock: stock
                });
            }

            localStorage.setItem('myCart', JSON.stringify(cart));
            window.location.href = "./Card.html";
        }
        window.quickAdd = quickAdd;


        /* ===============================
            (JSON LOCAL FILE)
        
        ================================ */

        // var xhr = new XMLHttpRequest();
        // xhr.open("GET", "../file.json");
        // xhr.send();

        // xhr.addEventListener('readystatechange', function () {
        //     if (xhr.readyState == 4 && xhr.status == 200) {
        //         var products = JSON.parse(xhr.responseText);
        //         renderProducts(products);
        //     }
        // });

        /* ===============================
           (Firebase Firestore)
        ================================ */

        async function getProductsFromFirebase() {
            const snapshot = await getDocs(collection(db, "products"));
            const products = [];

            snapshot.forEach(doc => {
                products.push({
                    id: doc.id,
                    ...doc.data() //spread data
                });
            });

            return products;
        }

        /* ===============================
            Products 
        ================================ */
        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = "";

            let index = 0;

            for (const product of products) {
                function createCard(p) {
                    if (!p) return '';
                    let mImg = p.images[0] || '';
                    let hImg = p.images[1] || mImg;

                    return `
                <div class="product-card">
                    <div class="product-img-box">
                        <img src="${mImg}" class="img-main">
                        <img src="${hImg}" class="img-hover">
                    </div>
                    <div class="product-info">
                        <h3>${p.title}</h3>
                        <div class="price-row">
                            <span class="price">$${p.price}</span>
                            <span class="rating">⭐ ${p.rating}</span>
                        </div>
                        <p class="stock-label">Stock: <span class="stock-number">${p.stock_quantity}</span></p>
                        <button class="add-to-cart-btn" data-id="${p.id}">
                            Add to Cart
                        </button>
                    </div>
                </div>`;
                }

                grid.innerHTML += createCard(product);
                grid.innerHTML += createCard(products[index + 10]);
                grid.innerHTML += createCard(products[index + 20]);
                grid.innerHTML += createCard(products[index + 30]);

                index++;
                if (index == 11) break;
            }

            // بعد ما نضيف الـ HTML للصفحة
            const buttons = grid.querySelectorAll('.add-to-cart-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const product = products.find(p => p.id === id);
                    if (product) {
                        quickAdd(product.id, product.title, product.price, product.images[0], product.stock_quantity);
                    }
                });
            });
        }

        (async function () {
            const products = await getProductsFromFirebase(); // جلب المنتجات من Firebase
            renderProducts(products); // عرضهم
        })();

        ;
    </script>
</body>

</html>
