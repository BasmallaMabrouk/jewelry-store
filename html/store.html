    <script>
        // 1. Unified Cart Logic
        function quickAdd(id, title, price, image, stock) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const existingIndex = cart.findIndex(item => item.id === id);

    if (existingIndex > -1) {
        if (cart[existingIndex].quantity < stock) {
            cart[existingIndex].quantity += 1;
        } else {
            alert("Maximum stock reached!");
            return;
        }
    } else {
        cart.push({
            id: id,
            title: title,
            price: price,
            image: image,
            quantity: 1,
            maxStock: stock
        });
    }

    localStorage.setItem('myCart', JSON.stringify(cart));
    window.location.href = "./Card.html";
}

/* ===============================
   (Firebase Firestore)
================================ */

async function getProductsFromFirebase() {
    const snapshot = await getDocs(collection(db, "products"));
    const products = [];

    snapshot.forEach(doc => {
        products.push({
            id: doc.id,
            ...doc.data() //spread data
        });
    });

    return products;
}

/* ===============================
    Products 
================================ */
function renderProducts(products) {
    var grid = document.getElementById('product-grid');
    grid.innerHTML = "";
    var index = 0;

                for (var product of products) {
                    // This function generates the HTML for each card to avoid repeating code 4 times
                    function createCard(p) {
                        if(!p) return '';
                        let mImg = p.images[0] || '';
                        let hImg = p.images[1] || mImg;
                        return `
                        <div class="product-card">
                            <div class="product-img-box">
                                <img src="${mImg}" class="img-main">
                                <img src="${hImg}" class="img-hover">
                            </div>
                            <div class="product-info">
                                <h3>${p.title}</h3>
                                <div class="price-row">
                                    <span class="price">$${p.price}</span>
                                    <span class="rating">⭐ ${p.rating}</span>
                                </div>
                                <p class="stock-label">Stock: <span class="stock-number">${p.stock_quantity}</span></p>
                                <button class="add-to-cart-btn" onclick="quickAdd(${p.id}, '${p.title}', ${p.price}, '${mImg}', ${p.stock_quantity})">
                                    Add to Cart
                                </button>
                            </div>
                        </div>`;
                    }

                    // Append the cards based on your index logic
                    grid.innerHTML += createCard(product); // Current loop item
                    grid.innerHTML += createCard(products[index + 10]); // Ring
                    grid.innerHTML += createCard(products[index + 20]); // Bracelet
                    grid.innerHTML += createCard(products[index + 30]); // Necklace

                    index++;
                    if (index == 11) return;
                }
            }
    ;
    </script>
