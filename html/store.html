<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Luxury Jewelry</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/ebe3054567.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="../js/navbar-user.js"></script>

    <style>
        .stock-label {
            font-size: 0.85rem;
            color: #8D7B68;
            margin: 5px 0;
            font-family: 'Bitter', serif;
        }
        .stock-number { font-weight: bold; }

        .product-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }
        /* ستايل إضافي لزر التفاصيل ليكون مختلفاً عن زر الإضافة */
        .details-btn {
            background-color: transparent;
            border: 1px solid #8D7B68;
            color: #8D7B68;
            padding: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .details-btn:hover {
            background-color: #8D7B68;
            color: white;
        }
    </style>
</head>

<body class="store-page">
    <header>
        <div class="Bar">
            <li id="userBox">
                <a style="color: #f6f0eb;" href="../html/Login.html" id="loginBtn">Login</a>
            </li>
            <nav>
                <div><a href="./Home.html">Home</a></div>
                <div class="jewelry"><a href="./store.html">Store</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Necklaces.html">Necklace</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Earrings.html">Earrings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Rings.html">Rings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Bracelets.html">Bracelets</a><i class="fa-solid fa-gem icon"></i></div>
            </nav>
            <div class="cart"> <a href="../html/Card.html">Cart</a> <i class="fa-solid fa-cart-arrow-down" style="color: #f6f0eb;"></i></div>
        </div>
    </header>

    <img src="../images/tttt.png" class="imagefadedd">

    <main class="store-main">
        <h1 class="section-title">Our Collection</h1>
        <div id="product-grid" class="product-grid"></div>
    </main>

    <footer class="main-footer">
        <p>© Girl`z Power A | B | M | G .</p>
    </footer>

    <script type="module">
        import { db } from "../js/CDNFirebase.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. دالة الإضافة للكارت
        function quickAdd(id, title, price, image, stock) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const existingIndex = cart.findIndex(item => item.id === id);

            if (existingIndex > -1) {
                if (cart[existingIndex].quantity < stock) {
                    cart[existingIndex].quantity += 1;
                } else {
                    alert("Maximum stock reached!");
                    return;
                }
            } else {
                cart.push({ id, title, price, image, quantity: 1, maxStock: stock });
            }

            localStorage.setItem('myCart', JSON.stringify(cart));
            window.location.href = "./Card.html";
        }
        window.quickAdd = quickAdd;

        // 2. دالة جلب البيانات
        async function getProductsFromFirebase() {
            try {
                const snapshot = await getDocs(collection(db, "products"));
                const products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                return products;
            } catch (error) {
                console.error("Error loading products:", error);
                return [];
            }
        }

        // 3. دالة بناء الكارت (الـ Template)
        function createCardHTML(p) {
            if (!p) return '';
            const mImg = (p.images && p.images[0]) ? p.images[0] : '';
            const hImg = (p.images && p.images[1]) ? p.images[1] : mImg;

            return `
            <div class="product-card">
                <div class="product-img-box">
                    <img src="${mImg}" class="img-main">
                    <img src="${hImg}" class="img-hover">
                </div>
                <div class="product-info">
                    <h3>${p.title}</h3>
                    <div class="price-row">
                        <span class="price">$${p.price}</span>
                        <span class="rating">⭐ ${p.rating}</span>
                    </div>
                    <p class="stock-label">Stock: <span class="stock-number">${p.stock_quantity}</span></p>
                    <div class="product-buttons">
                        <button class="add-to-cart-btn" data-id="${p.id}">
                            Add to Cart
                        </button>
                        <a href="./details.html?id=${p.id}">
                            <button class="details-btn">View Details</button>
                        </a>
                    </div>
                </div>
            </div>`;
        }

        // 4. دالة العرض الرئيسية
        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            grid.innerHTML = "";

            let htmlContent = "";
            let limit = Math.min(products.length, 11); // لضمان عدم حدوث Error لو المنتجات أقل من 11

            for (let i = 0; i < limit; i++) {
                htmlContent += createCardHTML(products[i]);
                if (products[i + 10]) htmlContent += createCardHTML(products[i + 10]);
                if (products[i + 20]) htmlContent += createCardHTML(products[i + 20]);
                if (products[i + 30]) htmlContent += createCardHTML(products[i + 30]);
            }

            grid.innerHTML = htmlContent;

            // تفعيل أزرار الكارت
            const buttons = grid.querySelectorAll('.add-to-cart-btn');
            buttons.forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    const product = products.find(p => p.id === id);
                    if (product) {
                        quickAdd(product.id, product.title, product.price, product.images[0], product.stock_quantity);
                    }
                };
            });
        }

        // تشغيل العملية
        (async function init() {
            const products = await getProductsFromFirebase();
            if (products.length > 0) {
                renderProducts(products);
            } else {
                document.getElementById('product-grid').innerHTML = "<p>No products found.</p>";
            }
        })();
    </script>
</body>
</html>
