<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store - Luxury Jewelry</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://kit.fontawesome.com/ebe3054567.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script type="module" src="../js/navbar-user.js"></script>

    <style>
        .stock-label {
            font-size: 0.85rem;
            color: #8D7B68;
            margin: 5px 0;
            font-family: 'Bitter', serif;
        }
        .stock-number { font-weight: bold; }

        .product-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .details-btn {
            background-color: transparent;
            border: 1px solid #8D7B68;
            color: #8D7B68;
            padding: 8px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
            display: block;
            width: 100%;
            box-sizing: border-box;
        }
        .details-btn:hover {
            background-color: #8D7B68;
            color: white;
        }

        /* --- Toast Style --- */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #705C49;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 3000;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: 'Bitter', serif;
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        /* ستايل Sold Out */
        .out-of-stock-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-weight: bold;
            z-index: 10;
            font-size: 0.8rem;
        }

        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>

<body class="store-page">
    <header>
        <div class="Bar">
            <li id="userBox">
                <a style="color: #f6f0eb;" href="../html/Login.html" id="loginBtn">Login</a>
            </li>
            <nav>
                <div><a href="./Home.html">Home</a></div>
                <div class="jewelry"><a href="./store.html">Store</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Necklaces.html">Necklace</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Earrings.html">Earrings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Rings.html">Rings</a><i class="fa-solid fa-gem icon"></i></div>
                <div class="jewelry"><a href="./Bracelets.html">Bracelets</a><i class="fa-solid fa-gem icon"></i></div>
            </nav>
            <div class="cart"> 
                <a href="../html/Card.html">Cart</a> 
                <i class="fa-solid fa-cart-arrow-down" style="color: #f6f0eb;"></i>
            </div>
        </div>
    </header>

    <img src="../images/tttt.png" class="imagefadedd">

    <main class="store-main">
        <h1 class="section-title">Our Full Collection</h1>
        <div id="product-grid" class="product-grid"></div>
    </main>

    <div id="toast">Added to cart! ✨</div>

    <footer class="main-footer">
        <p>© Girl`z Power A | B | M | G .</p>
    </footer>

    <script type="module">
        import { db } from "../js/CDNFirebase.js";
        import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. دالة التنبيه
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // 2. دالة الإضافة مع فحص المخزون
        function quickAdd(id, title, price, image, stock) {
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            const existingIndex = cart.findIndex(item => item.id === id);

            if (existingIndex > -1) {
                if (cart[existingIndex].quantity < stock) {
                    cart[existingIndex].quantity += 1;
                } else {
                    showToast("Maximum stock reached!");
                    return;
                }
            } else {
                if (stock > 0) {
                    cart.push({ id, title, price, image, quantity: 1, maxStock: stock });
                } else {
                    showToast("Out of stock!");
                    return;
                }
            }

            localStorage.setItem('myCart', JSON.stringify(cart));
            showToast(`${title} added to cart! ✨`);
        }
        window.quickAdd = quickAdd;

        // 3. جلب كل المنتجات
        async function getProductsFromFirebase() {
            try {
                const snapshot = await getDocs(collection(db, "products"));
                const products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                return products;
            } catch (error) {
                console.error("Error loading products:", error);
                return [];
            }
        }

        // 4. بناء كرت المنتج (Template) مع فحص نفاذ الكمية
        function createCardHTML(p) {
            if (!p) return '';
            const stock = p.stock_quantity || p.stock || 0;
            const isOutOfStock = stock <= 0;
            const mImg = (p.images && p.images[0]) ? p.images[0] : (p.image || '');
            const hImg = (p.images && p.images[1]) ? p.images[1] : mImg;

            return `
            <div class="product-card" style="${isOutOfStock ? 'opacity: 0.7;' : ''}">
                <div class="product-img-box">
                    <img src="${mImg}" class="img-main">
                    <img src="${hImg}" class="img-hover">
                    ${isOutOfStock ? '<div class="out-of-stock-badge">Sold Out</div>' : ''}
                </div>
                <div class="product-info">
                    <h3>${p.title}</h3>
                    <div class="price-row">
                        <span class="price">$${p.price}</span>
                        <span class="rating">⭐ ${p.rating || '5.0'}</span>
                    </div>
                    <p class="stock-label">
                        ${isOutOfStock ? 
                            '<span style="color:#e74c3c; font-weight:bold;">Out of Stock</span>' : 
                            `Stock: <span class="stock-number">${stock}</span>`}
                    </p>
                    <div class="product-buttons">
                        <button class="add-to-cart-btn" 
                            ${isOutOfStock ? 'disabled style="background:#ccc; cursor:not-allowed;"' : ''} 
                            onclick="quickAdd('${p.id}', '${p.title}', ${p.price}, '${mImg}', ${stock})">
                            ${isOutOfStock ? 'Sold Out' : 'Add to Cart'}
                        </button>
                        <a href="./details.html?id=${p.id}" class="details-btn">View Details</a>
                    </div>
                </div>
            </div>`;
        }

        // 5. العرض
        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            if (!grid) return;
            grid.innerHTML = products.map(p => createCardHTML(p)).join('');
        }

        (async function init() {
            const products = await getProductsFromFirebase();
            if (products.length > 0) {
                renderProducts(products);
            } else {
                document.getElementById('product-grid').innerHTML = "<p>No products found in our collection.</p>";
            }
        })();
    </script>
</body>
</html>
