<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .details-container {
            display: flex;
            max-width: 1100px;
            margin: 100px auto;
            gap: 50px;
            padding: 20px;
            background: white;
            border-radius: 20px;
        }
        .details-left { flex: 1; }
        .details-left img { width: 100%; border-radius: 15px; }
        .details-right { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .details-price { font-size: 2rem; color: #705C49; font-weight: bold; }
        .stock-tag { color: #8D7B68; font-style: italic; }
        .buy-btn {
            padding: 15px;
            background: #705C49;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body class="store-page">
    <div id="details-content" class="details-container">
    </div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');

    fetch("../file.json")
        .then(response => response.json())
        .then(products => {
            const product = products.find(p => p.id == productId);
            
            if (product) {
                // Determine images
                const img1 = product.images[0];
                const img2 = product.images[1] ? product.images[1] : product.images[0];

                document.getElementById('details-content').innerHTML = `
                    <div class="details-left">
                        <div class="details-img-wrapper">
                            <img src="${img1}" class="details-img-main">
                            <img src="${img2}" class="details-img-hover">
                        </div>
                    </div>

                    <div class="details-right">
                        <h1 class="prod-title">${product.title}</h1>
                        <p class="details-price">$${product.price}</p>
                        <hr>
                        <p class="description">${product.description}</p>
                        
                        <div class="purchase-section">
                            <label>Quantity:</label>
                            <div class="quantity-controls">
                                <button onclick="changeQty(-1)">-</button>
                                <input type="number" id="qty" value="1" min="1" max="${product.stock_quantity}">
                                <button onclick="changeQty(1)">+</button>
                            </div>
                            <p class="stock-status">Available Stock: <strong>${product.stock_quantity}</strong></p>
                            <button class="buy-btn">Add to Cart</button>
                        </div>
                    </div>
                `;
            }
        });

    function changeQty(amount) {
        const input = document.getElementById('qty');
        let val = parseInt(input.value) + amount;
        if (val >= 1 && val <= input.max) {
            input.value = val;
        }
    }
</script>
</body>
</html>
